<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - UrbanRoots</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="auth-page">
    <!-- Top Right Controls -->
    <div class="auth-controls">
        <button id="rtl-toggle" class="btn-toggle" title="Switch RTL/LTR">LTR</button>
        <button id="theme-toggle" class="btn-toggle" title="Toggle Dark/Light Mode">
            <i data-lucide="sun" id="theme-icon-light"></i>
            <i data-lucide="moon" id="theme-icon-dark" style="display: none;"></i>
        </button>
    </div>

    <div class="auth-card" style="margin-top: 4rem; margin-bottom: 4rem;">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <div class="logo-icon-container">
                    <i data-lucide="leaf"></i>
                </div>
                <span class="logo-text">Urban<span>Roots</span></span>
            </a>
            <h3>Create Account</h3>
            <p>Join the urban farming revolution</p>
        </div>

        <form class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-container">
                    <i data-lucide="user"></i>
                    <input type="text" placeholder="John Doe" required>
                </div>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <div class="input-container">
                    <i data-lucide="mail"></i>
                    <input type="email" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <div class="input-container">
                    <i data-lucide="phone"></i>
                    <input type="tel" placeholder="(555) 123-4567" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <i data-lucide="lock"></i>
                    <input type="password" placeholder="Create a password" required id="reg-pass">
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-container">
                    <i data-lucide="lock"></i>
                    <input type="password" placeholder="Confirm your password" required id="reg-pass-conf">
                </div>
            </div>

            <label class="terms-check">
                <input type="checkbox" required>
                <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></span>
            </label>

            <button type="submit" class="btn-auth">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
