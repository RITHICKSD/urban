<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UrbanRoots</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">
</head>

<body class="auth-page">
    <!-- Top Right Controls -->
    <div class="auth-controls">
        <button id="rtl-toggle" title="Switch RTL/LTR">
            <i data-lucide="globe"></i>
        </button>
        <button id="theme-toggle" title="Toggle Dark/Light Mode">
            <i data-lucide="sun" id="theme-icon-light"></i>
            <i data-lucide="moon" id="theme-icon-dark" style="display: none;"></i>
        </button>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <a href="index.html" class="auth-logo">
                <div class="logo-icon-container">
                    <i data-lucide="leaf"></i>
                </div>
                <span class="logo-text">Urban<span>Roots</span></span>
            </a>
            <h3>Welcome Back</h3>
            <p>Please enter your details to sign in</p>
        </div>

        <form class="auth-form">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-container">
                    <i data-lucide="mail"></i>
                    <input type="email" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <i data-lucide="lock"></i>
                    <input type="password" placeholder="Enter your password" required id="login-pass">
                </div>
            </div>

            <div class="form-utils">
                <label class="remember-me">
                    <input type="checkbox">
                    Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-auth">Login</button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="social-logins">
            <button class="btn-social">
                <img src="https://www.gstatic.com/images/branding/product/1x/gmail_512dp.png" alt="Google"
                    class="social-icon" style="filter: none;">
                Continue with Google
            </button>
            <button class="btn-social">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook" class="social-icon">
                Continue with Facebook
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? <a href="register.html">Register here</a>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
